<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Youth Justice CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: #17202a;
            background:
                linear-gradient(rgba(16, 38, 55, .82), rgba(16, 38, 55, .9)),
                url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80") center/cover;
        }
        .login-card { max-width: 440px; width: 100%; }
        .brand-mark {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(94, 234, 212, .16);
            border: 1px solid rgba(255, 255, 255, .24);
            color: #fff;
            font-size: 1.35rem;
        }
        .card {
            border: 1px solid rgba(255, 255, 255, .28);
            border-radius: 10px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, .28);
        }
        .btn-primary {
            --bs-btn-bg: #0f766e;
            --bs-btn-border-color: #0f766e;
            --bs-btn-hover-bg: #115e59;
            --bs-btn-hover-border-color: #115e59;
            font-weight: 700;
        }
        .form-control {
            border-radius: 7px;
            padding: .72rem .85rem;
        }
        .form-control:focus {
            border-color: #5eead4;
            box-shadow: 0 0 0 .2rem rgba(15, 118, 110, .16);
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center">
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="brand-mark mb-3"><i class="bi bi-shield-check"></i></div>
            <h2 class="text-white fw-bold mb-1">Youth Justice CMS</h2>
        </div>
        <div class="card shadow">
            <div class="card-body p-4">
                {% if form.errors %}
                    <div class="alert alert-danger">
                        Invalid username or password. Please try again.
                    </div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">
                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" id="id_username"
                               class="form-control" autofocus autocomplete="username" required>
                    </div>
                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" id="id_password"
                               class="form-control" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
